<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Builder Lite</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/accordion.css">
    <link rel="stylesheet" href="/static/css/sidebar.css">
    <link rel="stylesheet" href="/static/css/skeleton.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>JD Builder Lite</h1>
        </div>
    </header>

    <main class="container">
        <!-- Search Section -->
        <section class="search-container">
            <input
                type="search"
                id="search-input"
                placeholder="Search job titles..."
                aria-label="Search job titles"
            >
            <button id="search-button" type="button">Search</button>
        </section>

        <!-- Profile Info Card (initially hidden) -->
        <section id="profile-info" class="info-card hidden">
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">Job Title</span>
                    <span id="profile-title" class="info-value"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">NOC Code</span>
                    <span id="profile-noc" class="info-value"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">OASIS Source</span>
                    <a id="profile-link" class="info-value" href="#" target="_blank" rel="noopener noreferrer">View on OASIS</a>
                </div>
                <div class="info-item">
                    <span class="info-label">Retrieved</span>
                    <span id="profile-timestamp" class="info-value"></span>
                </div>
            </div>
        </section>

        <!-- Search Results (initially hidden) -->
        <section id="search-results" class="search-results hidden">
            <h2>Search Results</h2>
            <ul id="results-list"></ul>
        </section>

        <!-- JD Sections Accordion Container -->
        <section class="jd-sections" id="jd-sections">
            <!-- Accordion content will be populated by JavaScript -->
        </section>
    </main>

    <!-- Collapsible Sidebar -->
    <aside id="sidebar" class="sidebar collapsed">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle selection summary">
            <span class="toggle-icon"></span>
        </button>
        <div class="sidebar-content">
            <h2>Selection Summary</h2>
            <div id="selection-summary">
                <p class="empty-state">No selections yet</p>
            </div>
        </div>
    </aside>

    <!-- Sticky Action Bar Placeholder -->
    <footer id="action-bar" class="action-bar hidden">
        <!-- Content added by Plan 02 -->
    </footer>

    <!-- SortableJS CDN for drag-and-drop reordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <!-- Scripts (loaded in order) -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/accordion.js"></script>
    <script src="/static/js/selection.js"></script>
    <script src="/static/js/search.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
